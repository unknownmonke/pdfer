<!doctype html>
<html lang="en" class="h-100">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="">
        <meta name="theme-color" content="#7952b3">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css"
              rel="stylesheet"
              integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU"
              crossorigin="anonymous">

        <!-- Custom styles -->
        <link href="/main.css" rel="stylesheet">

        <title>Pdfer Client</title>
    </head>

    <body class="d-flex flex-column h-100">
        <header>
            <!-- Fixed navbar -->
            <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
                <div class="container-fluid px-3">
                    <span class="navbar-brand">Pdfer Client</span>
                    <button class="navbar-toggler"
                            type="button"
                            data-bs-toggle="collapse"
                            data-bs-target="#navbarCollapse"
                            aria-controls="navbarCollapse"
                            aria-expanded="false"
                            aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarCollapse">
                        <ul class="navbar-nav me-auto mb-2 mb-md-0">
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="download">Direct Download</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="email">Email</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <!-- Page content -->
        <main class="flex-shrink-0 container">
            <div class="bg-light p-5 pt-3 rounded">
                <h1 class="text-danger">Error</h1>
                <p class="lead">An error has occurred!</p>
                <p class="lead">HTTP Status : <span class="text-danger">{{ status }}</span></p>
                <p class="lead text-info">{{ message }}</p>
                <button type="button" class="btn btn-primary mt-2" onclick="window.history.back();">&laquo; Go Back</button>
            </div>
        </main>

        <!-- Sticky footer -->
        <footer class="footer mt-auto py-3 bg-light">
            <div class="container">
                <span class="text-muted">&copy; 2026, UnknownMonke LLC.</span>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ"
                crossorigin="anonymous">
        </script>
    </body>
</html>
